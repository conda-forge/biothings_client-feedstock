context:
  name: biothings_client
  version: "0.5.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/biothings_client-${{ version }}.tar.gz
  sha256: f9fddc7436d59bcde4f9a2501431fc744d142062ac4796585470adca29c59ed4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - httpx >=0.22.0
    - pandas >=1.1.5
    - pyld >=0.7.2

tests:
  - python:
      imports:
        - biothings_client
      python_version: ${{ python_min }}.*

about:
  summary: Python Client for BioThings API services.
  license: BSD-2-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/biothings/biothings_client.py

extra:
  recipe-maintainers:
    - hadim
